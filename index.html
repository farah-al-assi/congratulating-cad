<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<title>بطاقة تهنئة</title>
<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    html, body {
        height: 100%;
        overflow: hidden;
    }

    body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: radial-gradient(circle at 50% 20%, #fff8f6, #ffe1ea 70%, #ffc9dd);
        font-family: Tahoma, 'Segoe UI', Arial, sans-serif;
        position: relative;
    }

    #fx-canvas {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        pointer-events: none;
        z-index: 5;
    }

    .scene {
        perspective: 1800px;
        position: relative;
        z-index: 2;
    }

    /* ===== إطار الزخارف حول البطاقة ===== */
    .frame {
    position: relative;
    width: 380px;
    max-width: 90%;
    height: 540px;
    padding: 26px;
}

    .flower {
        position: absolute;
        font-size: 22px;
        filter: drop-shadow(0 2px 3px rgba(214,51,108,0.25));
        animation: sway 4s ease-in-out infinite;
        z-index: 1;
    }
    .flower.f-lg { font-size: 30px; }
    .flower.f-sm { font-size: 16px; }

    @keyframes sway {
        0%,100% { transform: rotate(-6deg) scale(1); }
        50% { transform: rotate(6deg) scale(1.08); }
    }

    /* توزيع الزهور حول الإطار بالكامل */
    .flower:nth-child(1)  { top: -4px;   left: 6%;   }
    .flower:nth-child(2)  { top: -10px;  left: 30%;  animation-delay: .3s;}
    .flower:nth-child(3)  { top: -6px;   left: 55%;  animation-delay: .6s;}
    .flower:nth-child(4)  { top: -12px;  left: 78%;  animation-delay: .9s;}
    .flower:nth-child(5)  { top: 14%;    right: -12px; animation-delay: .2s;}
    .flower:nth-child(6)  { top: 38%;    right: -16px; animation-delay: .5s;}
    .flower:nth-child(7)  { top: 62%;    right: -12px; animation-delay: .8s;}
    .flower:nth-child(8)  { bottom: -8px; right: 78%;  animation-delay: 1.1s;}
    .flower:nth-child(9)  { bottom: -12px; right: 55%; animation-delay: .4s;}
    .flower:nth-child(10) { bottom: -6px;  right: 30%; animation-delay: .7s;}
    .flower:nth-child(11) { bottom: -10px; right: 6%;  animation-delay: 1s;}
    .flower:nth-child(12) { top: 14%;    left: -16px; animation-delay: .35s;}
    .flower:nth-child(13) { top: 38%;    left: -18px; animation-delay: .65s;}
    .flower:nth-child(14) { top: 62%;    left: -14px; animation-delay: .95s;}

    /* ===== البطاقة ===== */
    .card {
        width: 100%;
        height: 100%;
        position: relative;
        cursor: pointer;
        transform-style: preserve-3d;
        z-index: 2;
    }

    .card-inner {
        position: relative;
        width: 100%;
        height: 100%;
        background: linear-gradient(160deg, #fffdfc, #fff3f6);
        border-radius: 22px;
        box-shadow: 0 20px 45px rgba(255, 150, 190, 0.4);
        overflow: hidden;
        border: 3px solid #ffc2d6;
    }

    /* ===== الوجه الأمامي: قلب + ورود ===== */
    .front {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transform-origin: top;
        transition: transform 1.2s cubic-bezier(.68,-0.45,.27,1.4);
        z-index: 3;
        background: linear-gradient(160deg, #fff3f6, #ffe1ea);
    }

    .card.open .front {
        transform: rotateX(-150deg);
        box-shadow: 0 -10px 25px rgba(0,0,0,0.08);
    }

    .heart-svg {
        width: 150px;
        height: 140px;
        animation: pulseHeart 2.4s ease-in-out infinite;
        filter: drop-shadow(0 8px 12px rgba(214,51,108,0.35));
    }

    @keyframes pulseHeart {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.06); }
    }

    .front .flower-ring {
        margin-top: 14px;
        font-size: 20px;
        letter-spacing: 10px;
        color: #d6336c;
    }

    .front .click-hint {
        margin-top: 20px;
        font-size: 14px;
        font-weight: bold;
        color: #b5406a;
        background: #ffffffaa;
        padding: 8px 18px;
        border-radius: 30px;
        animation: pulse 1.8s infinite;
    }

    @keyframes pulse {
        0%, 100% { opacity: 0.55; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.05); }
    }

    /* ===== الداخل ===== */
    .inside {
        position: absolute;
        inset: 0;
        padding: 28px 20px 20px;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        background: #fffaf7;
        overflow: hidden;
    }

    .inside h1 {
        font-size: 22px;
        color: #d6336c;
        margin-bottom: 6px;
        opacity: 0;
        transform: translateY(15px);
        transition: all .6s ease;
        transition-delay: .6s;
    }

    .inside .msg {
        font-size: 13.5px;
        color: #7a4a58;
        line-height: 1.9;
        margin-bottom: 10px;
        opacity: 0;
        transform: translateY(15px);
        transition: all .6s ease;
        transition-delay: .8s;
    }

    .card.open .inside h1,
    .card.open .inside .msg,
    .card.open .inside .baby-scene,
    .card.open .inside .stars {
        opacity: 1;
        transform: translateY(0);
    }

    /* ===== مشهد الرضيع الملفوف ===== */
    .baby-scene {
        position: relative;
        width: 170px;
        height: 160px;
        margin: 6px auto 4px;
        opacity: 0;
        transform: translateY(15px) scale(.9);
        transition: all .7s ease;
        transition-delay: 1s;
    }

    .card.open .baby-scene {
        transform: translateY(0) scale(1);
    }

    .cradle-glow {
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 150px;
        height: 40px;
        background: radial-gradient(ellipse at center, #ffd9e6 0%, transparent 70%);
        filter: blur(2px);
    }

    .swaddle {
        position: absolute;
        bottom: 12px;
        left: 50%;
        transform: translateX(-50%);
        width: 120px;
        height: 95px;
        background: linear-gradient(160deg, #ffc2d6, #ffabc9 55%, #ff9dc0);
        border-radius: 50% 50% 45% 45% / 60% 60% 40% 40%;
        box-shadow: inset -8px -6px 14px rgba(214,51,108,0.25),
                    inset 6px 6px 10px rgba(255,255,255,0.5);
        animation: rock 3.2s ease-in-out infinite;
        transform-origin: bottom center;
    }

    /* طيات القماش */
    .swaddle::before, .swaddle::after {
        content: "";
        position: absolute;
        background: rgba(255,255,255,0.35);
        border-radius: 50%;
    }
    .swaddle::before {
        width: 60px; height: 18px;
        top: 30px; left: 12px;
        transform: rotate(-8deg);
    }
    .swaddle::after {
        width: 50px; height: 14px;
        top: 52px; right: 10px;
        transform: rotate(6deg);
        background: rgba(214,51,108,0.12);
    }

    .baby-head {
        position: absolute;
        top: 4px;
        left: 50%;
        transform: translateX(-50%);
        width: 62px;
        height: 62px;
        background: radial-gradient(circle at 35% 30%, #fff6f2, #ffe4d6 75%);
        border-radius: 50%;
        box-shadow: inset -4px -4px 8px rgba(214,120,90,0.18);
        animation: rock 3.2s ease-in-out infinite;
        transform-origin: bottom center;
        z-index: 2;
    }
    /* بدون أي ملامح وجه - سطح ناعم فقط */

    .baby-bonnet {
        position: absolute;
        top: -10px;
        left: 50%;
        transform: translateX(-50%);
        width: 66px;
        height: 40px;
        background: linear-gradient(160deg, #ff9dc0, #ffb6d1);
        border-radius: 50% 50% 45% 45% / 70% 70% 30% 30%;
        z-index: 3;
        animation: rock 3.2s ease-in-out infinite;
        transform-origin: bottom center;
    }

    .baby-bonnet::after {
        content: "";
        position: absolute;
        bottom: -8px;
        left: 50%;
        transform: translateX(-50%);
        width: 14px;
        height: 14px;
        background: #ff5c93;
        border-radius: 50%;
        box-shadow: -10px 2px 0 -3px #ff5c93, 10px 2px 0 -3px #ff5c93;
    }

    @keyframes rock {
        0%, 100% { transform: translateX(-50%) rotate(-3deg); }
        50% { transform: translateX(-50%) rotate(3deg); }
    }

    .sparkle {
        position: absolute;
        font-size: 13px;
        color: #ffb6d1;
        animation: twinkle 1.6s ease-in-out infinite;
    }
    .sp1 { top: 6px; left: 6px; animation-delay: .2s; }
    .sp2 { top: 20px; right: 2px; animation-delay: .6s; }
    .sp3 { bottom: 30px; left: -6px; animation-delay: 1s; }

    @keyframes twinkle {
        0%, 100% { opacity: 0.2; transform: scale(0.8); }
        50% { opacity: 1; transform: scale(1.2); }
    }

    .stars {
        margin-top: auto;
        font-size: 14px;
        letter-spacing: 8px;
        color: #ffb6d1;
        opacity: 0;
        transform: translateY(15px);
        transition: all .6s ease;
        transition-delay: 1.3s;
    }
</style>
</head>
<body>

<canvas id="fx-canvas"></canvas>

<div class="scene">
    <div class="frame">
        <!-- زخارف الزهور حول البطاقة -->
        <span class="flower f-lg">🌸</span>
        <span class="flower">🌺</span>
        <span class="flower f-sm">🌷</span>
        <span class="flower f-lg">🌸</span>
        <span class="flower">💗</span>
        <span class="flower f-sm">🌷</span>
        <span class="flower f-lg">🌺</span>
        <span class="flower">🌸</span>
        <span class="flower f-sm">💗</span>
        <span class="flower f-lg">🌷</span>
        <span class="flower">🌸</span>
        <span class="flower f-sm">🌺</span>
        <span class="flower">💗</span>
        <span class="flower f-lg">🌸</span>

        <div class="card" id="card">
            <div class="card-inner">

                <!-- الداخل -->
                <div class="inside">
                    <h1>مبروك المولودة الجديدة</h1>
                    <p class="msg">
                        نبارك لكم قدوم المولودة الجميلة<br>
                        أسعد الله قلوبكم بها، وجعلها قرة عين لكم<br>
                    </p>

                    <div class="baby-scene">
                        <span class="sparkle sp1">✦</span>
                        <span class="sparkle sp2">✧</span>
                        <span class="sparkle sp3">✦</span>
                        <div class="cradle-glow"></div>
                        <div class="swaddle"></div>
                        <div class="baby-head"></div>
                        <div class="baby-bonnet"></div>
                    </div>

                    <div class="stars">✦ ✧ ✦ ✧ ✦</div>
                </div>

                <!-- الواجهة الأمامية: قلب وردي + ورود -->
                <div class="front">
                    <svg class="heart-svg" viewBox="0 0 100 90">
                        <defs>
                            <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#ff9dc0"/>
                                <stop offset="50%" stop-color="#ff6fa5"/>
                                <stop offset="100%" stop-color="#e94f8a"/>
                            </linearGradient>
                        </defs>
                        <path fill="url(#heartGrad)" d="M50 85
                            C 20 60, -5 35, 12 15
                            C 25 -2, 48 0, 50 20
                            C 52 0, 75 -2, 88 15
                            C 105 35, 80 60, 50 85 Z"/>
                    </svg>
                    <div class="flower-ring">🌸 🌷 🌺 🌷 🌸</div>
                    <div class="click-hint">اضغط / اضغطي على البطاقة 🎀</div>
                </div>

            </div>
        </div>
    </div>
</div>

<script>
    const card = document.getElementById('card');
    const canvas = document.getElementById('fx-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let opened = false;

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    const colors = ['#ffb6d1', '#ff9dc0', '#ffffff', '#ffe1ea', '#f7c6db', '#ffc2d6'];

    function createBurstParticle(x, y) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 8 + 3;
        return {
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 4,
            size: Math.random() * 6 + 4,
            color: colors[Math.floor(Math.random() * colors.length)],
            rotation: Math.random() * 360,
            rotSpeed: (Math.random() - 0.5) * 10,
            gravity: 0.15,
            life: 100,
            shape: Math.random() > 0.5 ? 'circle' : 'petal'
        };
    }

    function launchBurst(x, y) {
        for (let i = 0; i < 80; i++) particles.push(createBurstParticle(x, y));
    }

    function launchPetalRain() {
        for (let i = 0; i < 50; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: -20,
                vx: (Math.random() - 0.5) * 1.5,
                vy: Math.random() * 1.5 + 1.5,
                size: Math.random() * 7 + 5,
                color: colors[Math.floor(Math.random() * colors.length)],
                rotation: Math.random() * 360,
                rotSpeed: (Math.random() - 0.5) * 8,
                gravity: 0.03,
                life: 500,
                shape: 'petal'
            });
        }
    }

    function drawPetal(size) {
        ctx.beginPath();
        ctx.ellipse(0, 0, size / 2, size / 3.2, 0, 0, Math.PI * 2);
        ctx.fill();
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach((p, index) => {
            p.vy += p.gravity;
            p.x += p.vx;
            p.y += p.vy;
            p.rotation += p.rotSpeed;
            p.life -= 1;

            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rotation * Math.PI / 180);
            ctx.fillStyle = p.color;
            ctx.globalAlpha = Math.max(p.life / 100, 0);

            if (p.shape === 'circle') {
                ctx.beginPath();
                ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
                ctx.fill();
            } else {
                drawPetal(p.size);
            }
            ctx.restore();

            if (p.life <= 0 || p.y > canvas.height + 50) particles.splice(index, 1);
        });
        requestAnimationFrame(animate);
    }
    animate();

    card.addEventListener('click', () => {
        if (opened) return;
        opened = true;
        card.classList.add('open');

        const rect = card.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + 60;

        setTimeout(() => {
            launchBurst(cx, cy);
            launchPetalRain();
        }, 600);

        setTimeout(() => {
            launchBurst(cx - 90, cy + 40);
            launchBurst(cx + 90, cy + 40);
        }, 1200);
    });
</script>

</body>
</html>
